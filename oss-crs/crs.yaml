name: patchsense-crs
type:
  - bug-fixing   # semantic patch validator — filters patches from exchange dir

version: "1.0.0"
docker_registry: ghcr.io/aaronsrhodes/patchsense-crs

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build

crs_run_phase:
  validator:
    dockerfile: oss-crs/validator.Dockerfile
    additional_env:
      # Model to use for semantic patch assessment.
      # Default: use OSS_CRS_LLM_API_URL (LiteLLM proxy via oss-crs).
      # Set PATCHSENSE_MODEL to override (e.g. a locally-hosted Qwen model).
      PATCHSENSE_MODEL: "qwen2.5-coder-32b"
      # Confidence threshold for forwarding patches (0.0-1.0).
      # Patches below this threshold are held back as uncertain.
      PATCHSENSE_CONFIDENCE_THRESHOLD: "0.70"
      # Whether to forward uncertain patches (true/false).
      # false = conservative (only forward high-confidence root-cause-fixes).
      PATCHSENSE_FORWARD_UNCERTAIN: "false"
      # Timeout per patch assessment in seconds (0 = no limit).
      PATCHSENSE_TIMEOUT: "120"

supported_target:
  mode:
    - full
    - delta
  language:
    - c
    - c++
    - jvm
  sanitizer:
    - address
    - undefined
  architecture:
    - x86_64

required_inputs:
  - patch        # reads patches from FETCH_DIR, validates, re-submits approved
  - bug-candidate  # reads bug-candidate SARIFs to extract CWE/vuln context
