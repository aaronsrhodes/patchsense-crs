[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "patchsense"
version = "0.1.0"
description = "Semantic patch correctness validator for AI-generated vulnerability patches"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-c>=0.23.0",
    "tree-sitter-java>=0.23.0",
    "unidiff>=0.7.5",
    "pydantic>=2.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
patchsense = "patchsense.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["patchsense"]

[tool.hatch.build.targets.wheel.force-include]
"patchsense/data/family_invariants.json" = "patchsense/data/family_invariants.json"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
